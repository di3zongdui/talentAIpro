<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentAI Pro - 招聘Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .navbar h1 { font-size: 1.3rem; color: white; }
        .navbar-user { color: white; font-size: 0.9rem; display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; }

        /* 主容器 */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 左侧面板 */
        .left-panel {
            width: 280px;
            background: #1a1a2e;
            padding: 20px;
            border-right: 1px solid #2d2d4a;
            overflow-y: auto;
        }
        .panel-title {
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* 统计卡片 */
        .stat-card {
            background: #252542;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .stat-card:hover {
            background: #2d2d4a;
            border-color: #667eea;
        }
        .stat-card .label { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; color: #667eea; }
        .stat-card .sub { font-size: 0.75rem; color: #666; margin-top: 3px; }

        /* 快捷命令 */
        .quick-cmd {
            background: #252542;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .quick-cmd:hover {
            background: #2d2d4a;
            transform: translateX(5px);
        }
        .quick-cmd .icon { font-size: 1.1rem; }

        /* 对话区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f23;
        }
        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid #2d2d4a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .chat-header .info h3 { font-size: 1rem; color: white; }
        .chat-header .info p { font-size: 0.75rem; color: #38ef7d; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 25px;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }
        .message.user { flex-direction: row-reverse; }
        .message .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .message.bot .avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .message.user .avatar { background: #38ef7d; }
        .message .content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .message.bot .content {
            background: #1a1a2e;
            border-radius: 12px 12px 12px 0;
        }
        .message.user .content {
            background: #667eea;
            color: white;
            border-radius: 12px 12px 0 12px;
        }

        /* 候选人卡片结果 */
        .result-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        .result-card {
            background: #252542;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #3d3d5c;
        }
        .result-card .name { font-size: 1rem; font-weight: 600; color: white; margin-bottom: 5px; }
        .result-card .title { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
        .result-card .match { background: #38ef7d; color: #0f0f23; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; display: inline-block; margin-bottom: 10px; }
        .result-card .skills { display: flex; flex-wrap: wrap; gap: 5px; }
        .result-card .skill-tag { background: #3d3d5c; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; }
        .result-card .actions { margin-top: 10px; display: flex; gap: 8px; }
        .result-card .action-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            flex: 1;
        }
        .result-card .action-btn:hover { background: #5a6fd6; }

        /* 统计结果 */
        .stats-result {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 10px;
        }
        .stats-result .stat-item {
            background: #252542;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .stats-result .stat-item .num { font-size: 2rem; font-weight: bold; color: #667eea; }
        .stats-result .stat-item .txt { font-size: 0.8rem; color: #888; margin-top: 5px; }

        /* 漏斗 */
        .funnel-result {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }
        .funnel-step {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
        }
        .funnel-step .num { font-size: 1.3rem; font-weight: bold; }
        .funnel-step .label { font-size: 0.7rem; opacity: 0.8; }
        .funnel-arrow { color: #666; font-size: 1.2rem; }

        /* 输入区 */
        .input-area {
            padding: 20px 25px;
            border-top: 1px solid #2d2d4a;
            background: #1a1a2e;
        }
        .input-box {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #252542;
            border-radius: 25px;
            padding: 5px 5px 5px 20px;
            border: 1px solid #3d3d5c;
        }
        .input-box input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 0.95rem;
            outline: none;
            padding: 10px 0;
        }
        .input-box input::placeholder { color: #666; }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 加载动画 */
        .typing {
            display: flex;
            gap: 5px;
            padding: 15px;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #38ef7d;
            color: #0f0f23;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            display: none;
        }
        .toast.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* 响应式 */
        @media (max-width: 900px) {
            .left-panel { display: none; }
            .result-cards { grid-template-columns: 1fr; }
            .stats-result { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🤖 TalentAI Pro - 招聘Agent</h1>
        <div class="navbar-user">
            <span id="userDisplay"></span>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="main-container">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <div class="panel-title">📊 今日概览</div>
            <div class="stat-card" onclick="ask('我的成单情况')">
                <div class="label">本月成单</div>
                <div class="value">8</div>
                <div class="sub">↑ 3 单，较上月</div>
            </div>
            <div class="stat-card" onclick="ask('今天的面试安排')">
                <div class="label">今日面试</div>
                <div class="value">5</div>
                <div class="sub">14:00-18:00</div>
            </div>
            <div class="stat-card" onclick="ask('候选人库有多少人')">
                <div class="label">候选人库</div>
                <div class="value">234</div>
                <div class="sub">活跃候选人 89</div>
            </div>
            <div class="stat-card" onclick="ask('匹配成功率')">
                <div class="label">匹配率</div>
                <div class="value">67%</div>
                <div class="sub">本周 +5%</div>
            </div>

            <div class="panel-title" style="margin-top: 25px;">⚡ 快捷命令</div>
            <div class="quick-cmd" onclick="ask('帮我找一个5年经验的Python工程师')">
                <span class="icon">🔍</span>
                <span>寻访候选人</span>
            </div>
            <div class="quick-cmd" onclick="ask('推荐几个候选人')">
                <span class="icon">💡</span>
                <span>智能推荐</span>
            </div>
            <div class="quick-cmd" onclick="ask('查看招聘漏斗')">
                <span class="icon">📈</span>
                <span>招聘漏斗</span>
            </div>
            <div class="quick-cmd" onclick="ask('今天的面试安排')">
                <span class="icon">📅</span>
                <span>面试日程</span>
            </div>
            <div class="quick-cmd" onclick="ask('我的业绩怎么样')">
                <span class="icon">💰</span>
                <span>业绩概览</span>
            </div>
        </div>

        <!-- 对话区域 -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="avatar">🤖</div>
                <div class="info">
                    <h3>招聘Agent</h3>
                    <p>在线 · 随时为您服务</p>
                </div>
            </div>

            <div class="messages" id="messages">
                <!-- 欢迎消息 -->
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="content">
                        👋 您好！我是您的招聘AI助手。<br><br>
                        我可以帮您：<br>
                        • <strong>寻访候选人</strong> - "帮我找5年经验的Python"<br>
                        • <strong>智能推荐</strong> - "推荐几个候选人"<br>
                        • <strong>面试安排</strong> - "今天的面试安排"<br>
                        • <strong>业绩查询</strong> - "我的成单情况"<br><br>
                        请直接告诉我您的需求！
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="输入您的需求，例如：帮我找一个5年经验的Python工程师" onkeypress="if(event.key==='Enter')sendMessage()">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = 'http://localhost:8088';
        let isLoading = false;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            document.getElementById('userInput').focus();
        });

        function checkAuth() {
            const session = JSON.parse(localStorage.getItem('talentAI_session') || '{}');
            if (!session.user) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('userDisplay').textContent = session.user.name || session.user.email;
        }

        function logout() {
            localStorage.removeItem('talentAI_session');
            window.location.href = 'login.html';
        }

        // 快捷命令
        function ask(cmd) {
            document.getElementById('userInput').value = cmd;
            sendMessage();
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message || isLoading) return;

            // 添加用户消息
            addMessage(message, 'user');
            input.value = '';
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;

            // 添加加载动画
            const typingId = showTyping();

            // 分析意图并处理
            try {
                const response = await processCommand(message);
                removeTyping(typingId);
                addMessage(response.content, 'bot', response.type);
            } catch (e) {
                removeTyping(typingId);
                addMessage('抱歉，服务暂时不可用。请确保API服务已启动。', 'bot');
            }

            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
        }

        // 添加消息到界面
        function addMessage(content, type, msgType = 'text') {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${type}`;

            if (type === 'bot') {
                div.innerHTML = `
                    <div class="avatar">🤖</div>
                    <div class="content">${content}</div>
                `;
            } else {
                div.innerHTML = `
                    <div class="content">${content}</div>
                    <div class="avatar">👤</div>
                `;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // 显示加载动画
        function showTyping() {
            const container = document.getElementById('messages');
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.className = 'message bot';
            div.id = id;
            div.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // 核心：处理命令
        async function processCommand(cmd) {
            const lower = cmd.toLowerCase();

            // 1. 寻访候选人
            if (lower.includes('找') || lower.includes('寻访') || lower.includes('搜索')) {
                return await searchCandidates(cmd);
            }

            // 2. 推荐候选人
            if (lower.includes('推荐') || lower.includes('合适')) {
                return await recommendCandidates(cmd);
            }

            // 3. 面试安排
            if (lower.includes('面试') || lower.includes('日程')) {
                return await showInterviews();
            }

            // 4. 成单/业绩
            if (lower.includes('成单') || lower.includes('业绩') || lower.includes('收入')) {
                return await showDeals();
            }

            // 5. 招聘漏斗
            if (lower.includes('漏斗') || lower.includes('管道') || lower.includes('pipeline')) {
                return await showFunnel();
            }

            // 6. 候选人库数量
            if (lower.includes('多少') && (lower.includes('候选人') || lower.includes('人才'))) {
                return await showCandidateCount();
            }

            // 7. 候选人详情
            if (lower.includes('详情') || lower.includes('看') && lower.includes('候选人')) {
                return await showCandidateDetail(cmd);
            }

            // 8. 匹配率
            if (lower.includes('匹配率') || lower.includes('匹配成功')) {
                return await showMatchRate();
            }

            // 默认：通用查询
            return await generalQuery(cmd);
        }

        // 寻访候选人
        async function searchCandidates(cmd) {
            try {
                const res = await fetch(`${API_BASE}/api/candidates`);
                if (!res.ok) throw new Error('API不可用');
                const data = await res.json();
                const candidates = data.candidates || [];

                // 模拟提取技能要求
                let skills = [];
                if (cmd.includes('Python')) skills.push('Python');
                if (cmd.includes('Java')) skills.push('Java');
                if (cmd.includes('前端')) skills.push('React');
                if (cmd.includes('AI') || cmd.includes('人工智能')) skills.push('AI');
                if (cmd.includes('5年') || cmd.includes('5年经验')) {
                    // 筛选5年以上
                }

                const filtered = skills.length > 0
                    ? candidates.filter(c => c.skills && c.skills.some(s => skills.includes(s)))
                    : candidates.slice(0, 6);

                const cards = filtered.slice(0, 6).map(c => `
                    <div class="result-card">
                        <div class="name">${c.name}</div>
                        <div class="title">${c.current_title || c.position || '未知职位'} · ${c.current_company || '未知公司'}</div>
                        <div class="match">匹配度 ${Math.floor(70 + Math.random() * 30)}%</div>
                        <div class="skills">
                            ${(c.skills || []).slice(0, 4).map(s => `<span class="skill-tag">${s}</span>`).join('')}
                        </div>
                        <div class="actions">
                            <button class="action-btn" onclick="viewCandidate('${c.id}')">查看</button>
                            <button class="action-btn" onclick="recommendCandidate('${c.id}')">推荐</button>
                        </div>
                    </div>
                `).join('');

                return {
                    type: 'cards',
                    content: `<strong>🔍 为您找到 ${filtered.length} 位候选人：</strong><div class="result-cards">${cards}</div>`
                };
            } catch (e) {
                // API不可用，返回模拟数据
                return {
                    type: 'cards',
                    content: `<strong>🔍 为您找到 6 位候选人：</strong>
                    <div class="result-cards">
                        <div class="result-card">
                            <div class="name">张明</div>
                            <div class="title">高级Python工程师 · 字节跳动</div>
                            <div class="match">匹配度 92%</div>
                            <div class="skills">
                                <span class="skill-tag">Python</span>
                                <span class="skill-tag">Django</span>
                                <span class="skill-tag">AI</span>
                                <span class="skill-tag">5年+</span>
                            </div>
                            <div class="actions">
                                <button class="action-btn">查看</button>
                                <button class="action-btn">推荐</button>
                            </div>
                        </div>
                        <div class="result-card">
                            <div class="name">李华</div>
                            <div class="title">AI算法工程师 · 阿里巴巴</div>
                            <div class="match">匹配度 88%</div>
                            <div class="skills">
                                <span class="skill-tag">Python</span>
                                <span class="skill-tag">TensorFlow</span>
                                <span class="skill-tag">LLM</span>
                                <span class="skill-tag">6年</span>
                            </div>
                            <div class="actions">
                                <button class="action-btn">查看</button>
                                <button class="action-btn">推荐</button>
                            </div>
                        </div>
                        <div class="result-card">
                            <div class="name">王芳</div>
                            <div class="title">后端工程师 · 腾讯</div>
                            <div class="match">匹配度 85%</div>
                            <div class="skills">
                                <span class="skill-tag">Python</span>
                                <span class="skill-tag">Go</span>
                                <span class="skill-tag">微服务</span>
                                <span class="skill-tag">4年</span>
                            </div>
                            <div class="actions">
                                <button class="action-btn">查看</button>
                                <button class="action-btn">推荐</button>
                            </div>
                        </div>
                    </div>`
                };
            }
        }

        // 推荐候选人
        async function recommendCandidates(cmd) {
            return await searchCandidates('推荐候选人');
        }

        // 面试安排
        async function showInterviews() {
            return {
                type: 'text',
                content: `<strong>📅 今日面试安排（5场）</strong><br><br>
                <table style="width:100%; text-align:left; font-size:0.9rem;">
                    <tr style="border-bottom:1px solid #333;">
                        <th style="padding:8px 0;">时间</th>
                        <th style="padding:8px 0;">候选人</th>
                        <th style="padding:8px 0;">职位</th>
                        <th style="padding:8px 0;">类型</th>
                    </tr>
                    <tr style="border-bottom:1px solid #222;">
                        <td style="padding:8px 0;">14:00</td>
                        <td style="padding:8px 0;">张明</td>
                        <td style="padding:8px 0;">Python工程师</td>
                        <td style="padding:8px 0;"><span style="background:#667eea;padding:2px 8px;border-radius:4px;">技术面</span></td>
                    </tr>
                    <tr style="border-bottom:1px solid #222;">
                        <td style="padding:8px 0;">15:00</td>
                        <td style="padding:8px 0;">李华</td>
                        <td style="padding:8px 0;">AI算法工程师</td>
                        <td style="padding:8px 0;"><span style="background:#38ef7d;color:#0f0f23;padding:2px 8px;border-radius:4px;">HR面</span></td>
