<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招聘Agent - TalentAI Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #fff; height: 100vh; display: flex; flex-direction: column; }

        /* 顶部导航 */
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .navbar h1 { font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        .navbar-user { display: flex; align-items: center; gap: 15px; font-size: 0.9rem; }
        .navbar-user button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
        .navbar-user button:hover { background: rgba(255,255,255,0.3); }

        /* 主容器 */
        .main-container { flex: 1; display: flex; overflow: hidden; }

        /* 左侧边栏 - 功能面板 */
        .sidebar {
            width: 280px;
            background: #1a1a2e;
            border-right: 1px solid #2d2d44;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar-section { margin-bottom: 25px; }
        .sidebar-title { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .quick-action {
            background: #252540;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .quick-action:hover { background: #2d2d50; border-color: #667eea; }
        .quick-action .icon { font-size: 1.2rem; }
        .quick-action .text { font-size: 0.9rem; }
        .quick-action .desc { font-size: 0.7rem; color: #888; }

        /* 右侧对话区 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a2e 100%);
        }

        /* 消息区域 */
        .messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 欢迎消息 */
        .welcome-card {
            background: linear-gradient(135deg, rgba(102,126,234,0.2) 0%, rgba(118,75,162,0.2) 100%);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        .welcome-card h2 { font-size: 1.5rem; margin-bottom: 10px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome-card p { color: #aaa; font-size: 0.95rem; line-height: 1.6; }
        .welcome-examples { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .example-chip {
            background: rgba(102,126,234,0.2);
            border: 1px solid rgba(102,126,234,0.4);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .example-chip:hover { background: rgba(102,126,234,0.4); }

        /* 消息气泡 */
        .message { max-width: 80%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { align-self: flex-end; }
        .message.agent { align-self: flex-start; }

        .message-bubble {
            padding: 15px 20px;
            border-radius: 16px;
            line-height: 1.6;
        }
        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-bottom-right-radius: 4px;
        }
        .message.agent .message-bubble {
            background: #252540;
            border-bottom-left-radius: 4px;
        }

        /* Agent思考动画 */
        .thinking {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            background: #252540;
            border-radius: 16px;
            align-self: flex-start;
        }
        .thinking span {
            width: 8px; height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .thinking span:nth-child(1) { animation-delay: -0.32s; }
        .thinking span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* 消息时间 */
        .message-time { font-size: 0.7rem; color: #666; margin-top: 5px; padding: 0 10px; }
        .message.user .message-time { text-align: right; }

        /* 输入区域 */
        .input-area {
            padding: 20px 30px;
            background: #1a1a2e;
            border-top: 1px solid #2d2d44;
        }
        .input-container {
            display: flex;
            gap: 12px;
            background: #252540;
            border-radius: 12px;
            padding: 8px;
            border: 1px solid #3d3d5c;
        }
        .input-container:focus-within { border-color: #667eea; }
        .input-container input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            padding: 10px 15px;
            outline: none;
        }
        .input-container input::placeholder { color: #666; }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* 结果卡片 */
        .result-card {
            background: #252540;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid #3d3d5c;
        }
        .result-card h4 { color: #667eea; margin-bottom: 12px; font-size: 0.95rem; }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #3d3d5c;
        }
        .result-item:last-child { border-bottom: none; }
        .result-item .label { color: #888; font-size: 0.85rem; }
        .result-item .value { color: #fff; font-weight: 500; }

        /* 候选人卡片 */
        .candidate-cards { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .candidate-card {
            background: #1e1e35;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #3d3d5c;
            cursor: pointer;
            transition: all 0.2s;
        }
        .candidate-card:hover { border-color: #667eea; transform: translateX(5px); }
        .candidate-card .name { font-size: 1rem; font-weight: 600; margin-bottom: 5px; }
        .candidate-card .info { font-size: 0.85rem; color: #888; display: flex; gap: 15px; }
        .candidate-card .match { color: #38ef7d; font-weight: 600; }

        /* 标签 */
        .tag { background: rgba(102,126,234,0.3); padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        .toast.show { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🤖 招聘Agent</h1>
        <div class="navbar-user">
            <span id="userDisplay"></span>
            <button onclick="logout()">退出</button>
        </div>
    </div>

    <div class="main-container">
        <!-- 左侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">快捷操作</div>
                <div class="quick-action" onclick="sendExample('帮我找5年经验的Python工程师')">
                    <span class="icon">🔍</span>
                    <div>
                        <div class="text">寻访候选人</div>
                        <div class="desc">根据需求搜索人才</div>
                    </div>
                </div>
                <div class="quick-action" onclick="sendExample('看看今天有哪些面试安排')">
                    <span class="icon">📅</span>
                    <div>
                        <div class="text">面试安排</div>
                        <div class="desc">查看今日面试日程</div>
                    </div>
                </div>
                <div class="quick-action" onclick="sendExample('推荐几个候选人给我')">
                    <span class="icon">💡</span>
                    <div>
                        <div class="text">智能推荐</div>
                        <div class="desc">AI匹配最适合的候选人</div>
                    </div>
                </div>
                <div class="quick-action" onclick="sendExample('最近成单情况怎么样')">
                    <span class="icon">📈</span>
                    <div>
                        <div class="text">业绩概览</div>
                        <div class="desc">查看成单和业绩数据</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">数据统计</div>
                <div class="quick-action" onclick="sendExample('我的候选人库有多少人')">
                    <span class="icon">👥</span>
                    <div>
                        <div class="text">候选人</div>
                        <div class="desc" id="stat-candidates">加载中...</div>
                    </div>
                </div>
                <div class="quick-action" onclick="sendExample('现在有多少个职位在招聘')">
                    <span class="icon">📋</span>
                    <div>
                        <div class="text">招聘职位</div>
                        <div class="desc" id="stat-jobs">加载中...</div>
                    </div>
                </div>
                <div class="quick-action" onclick="sendExample('有多少交易在进行中')">
                    <span class="icon">🤝</span>
                    <div>
                        <div class="text">进行中交易</div>
                        <div class="desc" id="stat-deals">加载中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧对话区 -->
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="welcome-card">
                    <h2>👋 您好，我是招聘Agent</h2>
                    <p>我可以帮您：寻访人才、匹配候选人、安排面试、追踪交易、管理候选人库</p>
                    <div class="welcome-examples">
                        <span class="example-chip" onclick="sendExample('帮我找5年经验的Python')">5年Python</span>
                        <span class="example-chip" onclick="sendExample('推荐Java候选人')">推荐Java候选人</span>
                        <span class="example-chip" onclick="sendExample('今天有哪些面试')">今日面试</span>
                        <span class="example-chip" onclick="sendExample('成单情况')">成单情况</span>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="messageInput" placeholder="输入您的需求... 例如：帮我找一个5年经验的AI工程师" onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ========== 全局变量 ==========
        const API_BASE = 'http://localhost:8088';
        let session = JSON.parse(localStorage.getItem('talentAI_session') || '{}');
        let isThinking = false;

        // ========== 初始化 ==========
        (function init() {
            // 检查登录状态
            if (!session.user) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('userDisplay').textContent = session.user.name || session.user.email;
            loadStats();
        })();

        // ========== 加载统计数据 ==========
        async function loadStats() {
            try {
                const [candidates, jobs, deals] = await Promise.all([
                    fetch(`${API_BASE}/api/candidates`).then(r => r.json()).catch(() => []),
                    fetch(`${API_BASE}/api/jobs`).then(r => r.json()).catch(() => []),
                    fetch(`${API_BASE}/api/deals`).then(r => r.json()).catch(() => [])
                ]);
                document.getElementById('stat-candidates').textContent = Array.isArray(candidates) ? candidates.length + ' 人' : '暂无数据';
                document.getElementById('stat-jobs').textContent = Array.isArray(jobs) ? jobs.length + ' 个' : '暂无数据';
                document.getElementById('stat-deals').textContent = Array.isArray(deals) ? deals.length + ' 单' : '暂无数据';
            } catch (e) {
                document.getElementById('stat-candidates').textContent = '离线模式';
                document.getElementById('stat-jobs').textContent = '离线模式';
                document.getElementById('stat-deals').textContent = '离线模式';
            }
        }

        // ========== 消息处理 ==========
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendExample(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || isThinking) return;

            // 添加用户消息
            addMessage('user', text);
            input.value = '';
            isThinking = true;
            document.getElementById('sendBtn').disabled = true;

            // 显示思考动画
            showThinking();

            // 调用Agent处理
            try {
                const response = await callAgent(text);
                hideThinking();
                addMessage('agent', response.text, response.data);
            } catch (e) {
                hideThinking();
                addMessage('agent', '抱歉，服务暂时不可用。请确保API服务已启动（运行 run_api.bat）');
            }

            isThinking = false;
            document.getElementById('sendBtn').disabled = false;
        }

        function addMessage(type, text, data = null) {
            const container = document.getElementById('messages');
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;

            let html = `<div class="message-bubble">${escapeHtml(text)}</div>`;
            html += `<div class="message-time">${time}</div>`;

            // 如果有数据，添加结果卡片
            if (data) {
                html += renderDataCard(data);
            }

            msgDiv.innerHTML = html;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function renderDataCard(data) {
            if (!data || Object.keys(data).length === 0) return '';

            let html = '<div class="result-card">';

            if (data.candidates) {
                html += '<h4>👥 候选人列表</h4>';
                html += '<div class="candidate-cards">';
                data.candidates.forEach(c => {
                    html += `
                        <div class="candidate-card" onclick="viewCandidateDetail(${c.id})">
                            <div class="name">${c.name} ${c.match_score ? `<span class="match">匹配度 ${c.match_score}%</span>` : ''}</div>
                            <div class="info">
                                <span>${c.position || c.title || '未知职位'}</span>
                                <span>${c.company || ''}</span>
                                <span>${c.skills ? c.skills.slice(0,3).join(', ') : ''}</span>
                            </div>
                        </div>`;
                });
                html += '</div>';
            } else if (data.stats) {
                html += '<h4>📊 数据统计</h4>';
                for (const [key, value] of Object.entries(data.stats)) {
                    html += `<div class="result-item"><span class="label">${key}</span><span class="value">${value}</span></div>`;
                }
            } else if (data.matches) {
                html += '<h4>💡 匹配推荐</h4>';
                data.matches.forEach(m => {
                    html += `
                        <div class="result-item">
                            <span class="label">${m.candidate_name} → ${m.job_title}</span>
                            <span class="value">${m.score}% 匹配</span>
                        </div>`;
                });
            } else if (data.deals) {
                html += '<h4>📈 交易列表</h4>';
                data.deals.forEach(d => {
                    html += `
                        <div class="result-item">
                            <span class="label">${d.candidate_name || '候选人'} - ${d.job_title || '职位'}</span>
                            <span class="tag">${d.stage || '进行中'}</span>
                        </div>`;
                });
            } else if (Array.isArray(data) && data.length > 0) {
                // 通用列表
                html += '<h4>📋 查询结果</h4>';
                data.slice(0, 5).forEach(item => {
                    const name = item.name || item.title || item.candidate_name || '未知';
                    html += `<div class="result-item"><span class="label">${name}</span><span class="value">查看详情 →</span></div>`;
                });
            }

            html += '</div>';
            return html;
        }

        function showThinking() {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.id = 'thinking';
            div.className = 'message agent';
            div.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function hideThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        // ========== Agent大脑 ==========
        async function callAgent(userMessage) {
            const msg = userMessage.toLowerCase();
            const api = (endpoint, opts = {}) => fetch(`${API_BASE}${endpoint}`, opts).then(r => r.json()).catch(() => null);

            // 1. 寻访候选人
            if (msg.includes('找') && (msg.includes('人') || msg.includes('工程师') || msg.includes('开发') || msg.includes('python') || msg.includes('java'))) {
                const candidates = await api('/api/candidates');
                if (candidates && candidates.length > 0) {
                    // 提取关键词
                    const keywords = extractKeywords(userMessage);
                    const filtered = filterCandidates(candidates, keywords);
                    return {
                        text: `找到 ${filtered.length} 位符合条件的候选人：`,
                        data: { candidates: filtered.slice(0, 5) }
                    };
                }
                return { text: '候选人库暂无数据，请先添加候选人' };
            }

            // 2. 候选人数量
            if (msg.includes('候选人') && (msg.includes('多少') || msg.includes('库') || msg.includes('总数'))) {
                const candidates = await api('/api/candidates');
                const count = candidates ? candidates.length : 0;
                return {
                    text: `您的候选人库共有 ${count} 位候选人`,
                    data: { stats: { '候选人总数': count + ' 人' } }
                };
            }

            // 3. 职位数量
            if (msg.includes('职位') && (msg.includes('多少') || msg.includes('招聘'))) {
                const jobs = await api('/api/jobs');
                const count = jobs ? jobs.length : 0;
                return {
                    text: `当前共有 ${count} 个招聘职位`,
                    data: { stats: { '招聘职位': count + ' 个' } }
                };
            }

            // 4. 面试安排
            if (msg.includes('面试') || msg.includes('日程')) {
                const activities = await api('/api/activities');
                const interviews = activities ? activities.filter(a => a.type === 'interview').slice(0, 5) : [];
                if (interviews.length > 0) {
                    return {
                        text: `您有 ${interviews.length} 场面试安排：`,
                        data: { activities: interviews }
                    };
                }
                return { text: '今天暂无面试安排' };
            }

            // 5. 智能推荐
            if (msg.includes('推荐') && (msg.includes('候选人') || msg.includes('人选'))) {
                const [candidates, jobs] = await Promise.all([
                    api('/api/candidates'),
                    api('/api/jobs')
                ]);
                const matches = generateMatches(candidates || [], jobs || []);
                return {
                    text: `根据当前职位，推荐 ${matches.length} 位高匹配候选人：`,
                    data: { candidates: matches }
                };
            }

            // 6. 成单情况
            if (msg.includes('成单') || msg.includes('业绩') || msg.includes('交易')) {
                const deals = await api('/api/deals');
                if (deals && deals.length > 0) {
                    const stats = {
                        '总交易数': deals.length + ' 单',
                        '面试中': deals.filter(d => d.stage === 'interview').length + ' 单',
                        'Offer中': deals.filter(d => d.stage === 'offer').length + ' 单',
                        '已入职': deals.filter(d => d.stage === 'hired').length + ' 单'
                    };
                    return {
                        text: `交易概览：共 ${deals.length} 单`,
                        data: { stats, deals: deals.slice(0, 5) }
                    };
                }
                return { text: '暂无交易数据' };
            }

            // 7. 招聘漏斗
            if (msg.includes('漏斗') || msg.includes('管道')) {
                const [candidates, deals] = await Promise.all([
                    api('/api/candidates'),
                    api('/api/deals')
                ]);
                const funnel = {
                    '候选人': (candidates?.length || 0) + ' 人',
                    '匹配中': (deals?.filter(d => d.stage === 'candidate').length || 0) + ' 单',
                    '面试中': (deals?.filter(d => d.stage === 'interview').length || 0) + ' 单',
                    'Offer': (deals?.filter(d => d.stage === 'offer').length || 0) + ' 单',
                    '入职': (deals?.filter(d => d.stage === 'hired').length || 0) + ' 单'
                };
                return { text: '📊 招聘漏斗数据：', data: { stats: funnel } };
            }

            // 8. 创建候选人
            if (msg.includes('新建') && msg.includes('候选人')) {
                return { text: '好的，要创建新候选人，请告诉我：姓名、邮箱、职位、公司、技能（可选）', data: null };
            }

            // 9. 创建职位
            if (msg.includes('新建') && msg.includes('职位')) {
                return { text: '好的，要创建新职位，请告诉我：职位名称、公司、薪资范围、地点', data: null };
            }

            // 默认回复
            const suggestions = [
                '帮我找5年经验的Python工程师',
                '推荐几个候选人',
                '查看成单情况',
                '看看今天的面试安排'
            ];
            return { text: `我理解您的需求。试试这样说：\n• "帮我找一个5年经验的AI工程师"\n• "推荐几个候选人"\n• "查看成单情况"\n• "今天的面试安排"` };
        }

        // ========== 工具函数 ==========
        function extractKeywords(msg) {
            const skills = ['python', 'java', 'go', 'rust', 'javascript', 'typescript', 'react', 'vue', 'ai', 'llm', 'nlp', '机器学习', '深度学习'];
            const years = msg.match(/(\d+)\s*年/);
            return {
                skills: skills.filter(s => msg.includes(s)),
                years: years ? parseInt(years[1]) : null
            };
        }

        function filterCandidates(candidates, keywords) {
            return candidates.filter(c => {
                if (keywords.skills.length > 0) {
                    const candidateSkills = (c.skills || '').map(s => s.toLowerCase());
                    return keywords.skills.some(s => candidateSkills.some(cs => cs.includes(s)));
                }
                return true;
            }).map(c => ({
                ...c,
                match_score: calculateMatchScore(c, keywords)
            })).sort((a, b) => b.match_score - a.match_score);
        }

        function calculateMatchScore(candidate, keywords) {
            let score = 60;
            if (keywords.skills.length > 0) {
                const candidateSkills = (candidate.skills || []).map(s => s.toLowerCase());
                const matchCount = keywords.skills.filter(s => candidateSkills.some(cs => cs.includes(s))).length;
                score += matchCount * 15;
            }
            return Math.min(98, score);
        }

        function generateMatches(candidates, jobs) {
            if (candidates.length === 0 || jobs.length === 0) return [];
            return candidates.slice(0, 3).map((c, i) => ({
                ...c,
                match_score: 75 + Math.floor(Math.random() * 20),
                job_title: jobs[i % jobs.length]?.title || '匹配职位'
            }));
        }

        function viewCandidateDetail(id) {
            showToast('候选人详情功能开发中');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function logout() {
            localStorage.removeItem('talentAI_session');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
